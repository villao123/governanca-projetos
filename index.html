<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governança de Projetos · Grupo DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#0a1420; --bg2:#0d1a29; --card:#0f1e30; --card2:#152840; --card3:#1a2f4a; --border:#233852;
    --text:#eef3f8; --text2:#93a6bd; --text3:#5c7089;
    --c-teal:#2dd4bf; --c-gold:#e0a94b; --c-blue:#7ea6e0; --c-rose:#e08a8a;
    --c-plum:#ad93de; --c-sage:#7bcf9a; --c-stone:#8a9cb3; --c-amber:#f0b23c; --c-red:#e2685f;
    --radius:16px; --radius-sm:11px;
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 8px 24px -12px rgba(0,0,0,.5);
    --shadow-lg:0 4px 10px rgba(0,0,0,.3), 0 20px 40px -16px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(1100px 500px at 12% -8%, rgba(45,212,191,.08), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(224,169,75,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh;
  }
  h1, h2, h3, .box-title, .rail-name{font-family:'Sora',-apple-system,sans-serif;}
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 30px; border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, var(--bg2), var(--bg)); flex-wrap:wrap; gap:14px;
    position:relative;
  }
  header::after{
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(90deg, var(--c-teal), transparent 45%);
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand img{height:36px; border-radius:8px;}
  .brand .chev{color:var(--c-teal); font-weight:800; margin-right:2px;}
  .brand h1{font-size:19px; font-weight:700; letter-spacing:.2px;}
  .brand span{font-size:12px; color:var(--text3); display:block; margin-top:1px;}
  .toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  input[type="text"]{
    background:var(--card2); border:1px solid var(--border); color:var(--text);
    padding:10px 15px; border-radius:var(--radius-sm); font-size:13px; min-width:220px;
    font-family:'Inter',sans-serif; transition:border-color .15s;
  }
  input[type="text"]:focus, select:focus{outline:none; border-color:var(--c-teal);}
  .btn{
    background:var(--c-teal); color:#06251f; border:none; padding:10px 18px;
    border-radius:var(--radius-sm); font-size:13px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; transition:transform .12s, box-shadow .12s, opacity .15s;
    box-shadow:0 2px 10px -2px rgba(45,212,191,.45);
  }
  .btn:hover{transform:translateY(-1px); box-shadow:0 4px 16px -2px rgba(45,212,191,.55);}
  .btn.secondary{background:var(--card2); border:1px solid var(--border); color:var(--text2); box-shadow:none;}
  .btn.secondary:hover{border-color:var(--c-teal); color:var(--text); transform:none;}
  .btn.danger{background:var(--c-red); color:#2a0e0c; box-shadow:0 2px 10px -2px rgba(226,104,95,.4);}
  .btn.ghost{background:transparent; border:1px solid var(--border); color:var(--text2); padding:7px 12px; font-size:12px; box-shadow:none;}

  main{padding:26px 30px; max-width:1400px; margin:0 auto;}
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px; margin-top:22px;
  }
  .pcard{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; cursor:pointer; transition:border-color .18s, transform .15s, box-shadow .18s;
    box-shadow:var(--shadow);
  }
  .pcard:hover{border-color:rgba(45,212,191,.45); transform:translateY(-3px); box-shadow:var(--shadow-lg);}
  .pcard .codigo{font-size:10.5px; color:var(--text3); font-weight:700; letter-spacing:.6px;}
  .pcard h3{font-size:15.5px; margin:7px 0 13px; line-height:1.35; font-weight:700;}
  .pcard .sponsor-row{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); margin-bottom:10px;}
  .pcard .sponsor-row .tag{
    background:rgba(240,178,60,.14); color:var(--c-amber); padding:3px 9px;
    border-radius:20px; font-size:9.5px; font-weight:700; letter-spacing:.5px;
  }
  .pcard .count{font-size:12px; color:var(--text3); display:flex; align-items:center; gap:6px;}
  .empty{
    text-align:center; padding:70px 20px; color:var(--text3);
  }
  .empty h2{color:var(--text2); font-size:16px; margin-bottom:8px; font-weight:700; font-family:'Sora',sans-serif;}

  /* Overlay / Modal */
  .overlay{
    display:none; position:fixed; inset:0; background:rgba(4,8,14,.72); backdrop-filter:blur(2px);
    z-index:100; align-items:flex-start; justify-content:center; overflow-y:auto;
    padding:20px 16px;
  }
  .overlay.open{display:flex;}
  #projectOverlay.open{z-index:200;}
  #personOverlay.open{z-index:200;}
  #confirmOverlay.open{z-index:300;}
  .modal{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    width:100%; max-width:480px; padding:22px; margin-top:10px; box-shadow:var(--shadow-lg);
  }
  .modal.wide{
    max-width:96vw; width:96vw; max-height:90vh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .modal h2{font-size:16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; font-weight:700; flex-shrink:0;}
  .modal h2 .close{cursor:pointer; color:var(--text3); font-size:20px; line-height:1; transition:color .12s;}
  .modal h2 .close:hover{color:var(--text);}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:600;}
  .field input, .field select{
    width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
    padding:10px 13px; border-radius:var(--radius-sm); font-size:13px; font-family:'Inter',sans-serif;
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--c-teal);}
  .field-row{display:flex; gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex; justify-content:space-between; gap:10px; margin-top:16px; flex-shrink:0;}
  .modal-actions .grp{display:flex; gap:10px;}

  /* Governance detail — organogram / branch style, fills available height, no page scroll on desktop */
  .gov-diagram{display:flex; align-items:stretch; flex:1; min-height:0;}

  .gov-rail{
    background:linear-gradient(180deg, rgba(240,178,60,.18), rgba(240,178,60,.05));
    border:1px solid rgba(240,178,60,.32); border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 10px; min-width:46px; margin-right:18px; flex-shrink:0;
  }
  .gov-rail .rail-label{writing-mode:vertical-rl; transform:rotate(180deg); font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--c-amber);}
  .gov-rail .rail-name{writing-mode:vertical-rl; transform:rotate(180deg); font-size:13px; font-weight:700; color:var(--text);}

  .gov-branch{
    position:relative; display:flex; flex-direction:column; gap:8px; padding-left:18px;
    justify-content:space-between; margin-right:22px; flex-shrink:0; min-height:0;
  }
  .gov-branch-right{
    position:relative; display:flex; flex-direction:row; gap:14px; padding-left:18px;
    flex:1; min-width:0; min-height:0;
  }
  .gov-branch::before{
    content:''; position:absolute; left:0; top:18px; bottom:18px; width:1.5px; background:var(--border);
  }
  .gov-branch-right::before{
    content:''; position:absolute; left:0; top:18px; right:calc(100% - 18px - 2px); height:1.5px; width:auto;
    background:transparent; border-top:1.5px solid var(--border);
  }
  .gov-box{
    position:relative; background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:11px 13px; min-width:170px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; min-height:0;
  }
  .gov-branch .gov-box::before{
    content:''; position:absolute; left:-18px; top:18px; width:18px; height:1.5px; background:var(--border);
  }
  .gov-branch-right .gov-box{flex:1; min-width:0;}
  .gov-branch-right .gov-box::before{
    content:''; position:absolute; left:14px; top:-16px; width:1.5px; height:16px; background:var(--border);
  }
  .gov-box .box-title{
    font-size:11px; font-weight:700; letter-spacing:.3px; display:flex; align-items:center; gap:6px;
    margin-bottom:6px; flex-shrink:0;
  }
  .gov-box .person-list{flex:1; min-height:0; overflow-y:auto; margin-right:-6px; padding-right:6px;}
  .gov-box .add-person-btn{flex-shrink:0;}
  .gov-box .person-list::-webkit-scrollbar{width:5px;}
  .gov-box .person-list::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}

  .dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0;}
  .dot.teal{background:var(--c-teal);} .dot.gold{background:var(--c-gold);}
  .dot.blue{background:var(--c-blue);} .dot.rose{background:var(--c-rose);}
  .dot.plum{background:var(--c-plum);} .dot.sage{background:var(--c-sage);}
  .dot.stone{background:var(--c-stone);}

  .person{
    background:var(--card3); border:1px solid var(--border); border-left:3px solid var(--border);
    border-radius:8px; padding:9px 40px 9px 11px; margin-bottom:7px; font-size:12px; position:relative;
  }
  .person .pname{font-weight:700; font-size:12.5px; margin-bottom:3px;}
  .person .pmeta{color:var(--text3); font-size:11px; line-height:1.5;}
  .person .pmeta b{color:var(--text2); font-weight:600;}
  .person-actions{position:absolute; top:8px; right:8px; display:flex; gap:6px;}
  .person-actions span{cursor:pointer; color:var(--text3); font-size:12px;}
  .person-actions span:hover{color:var(--text);}
  .add-person-btn{
    width:100%; background:transparent; border:1px dashed var(--border); color:var(--text3);
    padding:6px; border-radius:6px; font-size:11px; cursor:pointer; margin-top:2px;
  }
  .add-person-btn:hover{border-color:var(--c-teal); color:var(--c-teal);}
  .sec-empty{font-size:11px; color:var(--text3); font-style:italic; padding:4px 0;}

  @media(max-width:900px){
    .modal.wide{display:block; overflow-y:auto; max-height:92vh;}
    .gov-diagram{flex-direction:column; gap:16px; flex:none;}
    .gov-rail{writing-mode:horizontal-tb; transform:none; min-width:auto; margin-right:0; margin-bottom:4px; flex-direction:row;}
    .gov-branch{padding-left:0; margin-right:0;}
    .gov-branch-right{padding-left:0; flex-direction:column; gap:10px;}
    .gov-branch::before, .gov-branch-right::before, .gov-box::before{display:none;}
    .gov-box{min-height:auto;}
    .gov-branch .gov-box .person-list, .gov-branch-right .gov-box .person-list{max-height:160px; flex:none;}
  }

  #loadingOverlay{
    position:fixed; inset:0; background:var(--bg); z-index:999;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
  }
  .spinner{
    width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--c-teal);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .confirm-box p{font-size:13px; color:var(--text2); margin-bottom:18px;}

  @media(max-width:640px){
    header{padding:14px 16px;} main{padding:16px;}
    .toolbar{width:100%;} input[type="text"]{flex:1; min-width:0;}
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="color:#9ba7b4; font-size:13px">Carregando governança dos projetos…</div>
</div>

<header>
  <div class="brand">
    <img id="logoImg" src="" alt="Grupo DB">
    <div>
      <h1><span class="chev">›</span>Governança de Projetos</h1>
      <span>PMO Corporativo · Grupo DB</span>
    </div>
  </div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Buscar projeto...">
    <button class="btn secondary" id="backupBtn">⬇ Backup</button>
    <button class="btn" id="newProjectBtn">+ Novo Projeto</button>
  </div>
</header>

<main>
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none">
    <h2>Nenhum projeto cadastrado ainda</h2>
    <p>Clique em "+ Novo Projeto" para começar a mapear a governança.</p>
  </div>
</main>

<!-- Modal: Novo/Editar Projeto -->
<div class="overlay" id="projectOverlay">
  <div class="modal">
    <h2><span id="projectModalTitle">Novo Projeto</span><span class="close" onclick="closeProjectModal()">&times;</span></h2>
    <div class="field">
      <label>Nome do Projeto</label>
      <input type="text" id="pjNome" placeholder="Ex: Projeto Ampliação da UP GO">
    </div>
    <div class="field">
      <label>Código do Projeto</label>
      <input type="text" id="pjCodigo" placeholder="Ex: 6142325">
    </div>
    <div class="field">
      <label>Sponsor</label>
      <input type="text" id="pjSponsor" placeholder="Nome completo do Sponsor">
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeProjectModal()">Cancelar</button>
      <button class="btn" onclick="saveProject()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalhe de Governança -->
<div class="overlay" id="detailOverlay">
  <div class="modal wide">
    <h2>
      <span style="display:flex; align-items:baseline; gap:10px; min-width:0">
        <span id="detailTitle" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Governança</span>
        <span id="detailMeta" style="font-size:11px; color:var(--text3); font-weight:400; white-space:nowrap">—</span>
      </span>
      <span class="close" onclick="closeDetail()">&times;</span>
    </h2>
    <div class="gov-diagram">
      <div class="gov-rail">
        <div class="rail-label">SPONSOR</div>
        <div class="rail-name" id="detailSponsor">—</div>
      </div>
      <div class="gov-branch" id="govLeftBranch"></div>
      <div class="gov-branch-right" id="govRightBranch"></div>
    </div>
    <div class="modal-actions">
      <div class="grp">
        <button class="btn secondary" onclick="exportToPPT(event)">⬇ Baixar para PPT</button>
      </div>
      <div class="grp">
        <button class="btn danger" onclick="askDeleteProject()">Excluir Projeto</button>
        <button class="btn secondary" onclick="openEditProject()">Editar Dados do Projeto</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Nova/Editar Pessoa -->
<div class="overlay" id="personOverlay">
  <div class="modal">
    <h2><span id="personModalTitle">Adicionar Pessoa</span><span class="close" onclick="closePersonModal()">&times;</span></h2>
    <div class="field">
      <label>Papel no Projeto</label>
      <select id="psPapel">
        <option value="pmo">PMO</option>
        <option value="gestor">Gestor do Projeto</option>
        <option value="lider">Líder do Projeto</option>
        <option value="head">Head</option>
        <option value="backoffice">Equipe de Backoffice</option>
        <option value="equipe">Equipe do Projeto</option>
        <option value="terceiros">Terceiros</option>
      </select>
    </div>
    <div class="field">
      <label>Nome Completo</label>
      <input type="text" id="psNome" placeholder="Nome completo">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Setor</label>
        <input type="text" id="psSetor" placeholder="Ex: TI, Comercial...">
      </div>
      <div class="field">
        <label>Unidade</label>
        <input type="text" id="psUnidade" placeholder="Ex: Maringá">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Gerente</label>
        <input type="text" id="psGerente" placeholder="Nome do gerente direto">
      </div>
      <div class="field">
        <label>Head</label>
        <input type="text" id="psHead" placeholder="Nome do head">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closePersonModal()">Cancelar</button>
      <button class="btn" onclick="savePerson()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Confirmação -->
<div class="overlay" id="confirmOverlay">
  <div class="modal confirm-box" style="max-width:360px">
    <h2><span id="confirmTitle">Confirmar</span><span class="close" onclick="closeConfirm()">&times;</span></h2>
    <p id="confirmText">Tem certeza?</p>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn danger" id="confirmActionBtn">Confirmar</button>
    </div>
  </div>
</div>

<!-- Container oculto usado apenas para gerar a imagem de exportação -->
<div id="pptExportContainer" style="position:fixed; left:-10000px; top:0; width:1280px; background:#ffffff;"></div>

<script type="module">
// ─── Firebase Setup ─────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyABwH8VS6OXdTEhtifxrokrdKEPFxLtQXA",
  authDomain: "db-pmo.firebaseapp.com",
  projectId: "db-pmo",
  storageBucket: "db-pmo.firebasestorage.app",
  messagingSenderId: "1044938646039",
  appId: "1:1044938646039:web:d326db7fa03f14b634b252"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ⚠️ Coleção NOVA e ISOLADA — nunca toca na coleção "pmo" do outro dashboard
const DOC_REF = () => doc(db, "governanca", "projetos");

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}

// ─── SEGURANÇA: salvar com múltiplas camadas de proteção ────────────────────
async function save(){
  // 1) Backup local sempre, antes de qualquer coisa
  try{
    if(projects && projects.length > 0){
      localStorage.setItem(LOCAL_KEY, JSON.stringify(projects));
      localStorage.setItem(LOCAL_TS_KEY, new Date().toISOString());
    }
  }catch(e){ console.warn("Erro no backup local:", e); }

  // 2) NUNCA grava vazio no Firestore por engano
  if(!projects || projects.length === 0){
    console.warn("save() chamado com projects vazio — gravação no Firestore BLOQUEADA por segurança.");
    return;
  }

  // 3) Grava no Firestore
  try{
    await setDoc(DOC_REF(), { data: JSON.stringify(projects) });
  }catch(e){
    console.error("Erro ao salvar no Firestore:", e);
  }
}

function downloadBackup(){
  const blob = new Blob([JSON.stringify(projects, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  a.href = url; a.download = `governanca-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
document.getElementById("backupBtn").addEventListener("click", downloadBackup);

// ─── Render: grid de projetos ────────────────────────────────────────────────
function render(filter=""){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  const f = filter.trim().toLowerCase();
  const list = projects.filter(p =>
    !f || p.nome.toLowerCase().includes(f) || (p.codigo||"").toLowerCase().includes(f)
  );

  if(projects.length === 0){
    grid.innerHTML = ""; empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  if(list.length === 0){
    grid.innerHTML = `<div class="sec-empty" style="grid-column:1/-1; text-align:center; padding:30px">Nenhum projeto encontrado para essa busca.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const total = (p.pessoas||[]).length;
    return `
      <div class="pcard" onclick="openDetail('${p.id}')">
        <div class="codigo">${escapeHtml(p.codigo || "SEM CÓDIGO")}</div>
        <h3>${escapeHtml(p.nome)}</h3>
        <div class="sponsor-row"><span class="tag">SPONSOR</span> ${escapeHtml(p.sponsor || "—")}</div>
        <div class="count">👥 ${total} pessoa${total===1?"":"s"} cadastrada${total===1?"":"s"}</div>
      </div>`;
  }).join("");
}
document.getElementById("searchInput").addEventListener("input", e => render(e.target.value));

// ─── Projeto: criar / editar / excluir ───────────────────────────────────────
window.openNewProject = function(){
  editingProjectId = null;
  document.getElementById("projectModalTitle").textContent = "Novo Projeto";
  document.getElementById("pjNome").value = "";
  document.getElementById("pjCodigo").value = "";
  document.getElementById("pjSponsor").value = "";
  document.getElementById("projectOverlay").classList.add("open");
}
document.getElementById("newProjectBtn").addEventListener("click", window.openNewProject);

window.openEditProject = function(){
  const p = projects.find(x => x.id === currentProjectId);
  if(!p) return;
  editingProjectId = p.id;
  document.getElementById("projectModalTitle").textContent = "Editar Projeto";
  document.getElementById("pjNome").value = p.nome;
  document.getElementById("pjCodigo").value = p.codigo || "";
  document.getElementById("pjSponsor").value = p.sponsor || "";
  document.getElementById("projectOverlay").classList.add("open");
}

window.closeProjectModal = function(){
  document.getElementById("projectOverlay").classList.remove("open");
}

window.saveProject = function(){
  const nome = document.getElementById("pjNome").value.trim();
  if(!nome){ alert("Informe o nome do projeto."); return; }
  const codigo = document.getElementById("pjCodigo").value.trim();
  const sponsor = document.getElementById("pjSponsor").value.trim();

  if(editingProjectId){
    const p = projects.find(x => x.id === editingProjectId);
    p.nome = nome; p.codigo = codigo; p.sponsor = sponsor;
    if(currentProjectId === editingProjectId){
      document.getElementById("detailTitle").textContent = nome;
      document.getElementById("detailSponsor").textContent = sponsor || "—";
      document.getElementById("detailMeta").textContent = codigo ? `Código: ${codigo}` : "—";
    }
  } else {
    projects.push({
      id: "proj_" + Date.now(),
      nome, codigo, sponsor,
      pessoas: []
    });
  }
  save();
  closeProjectModal();
  render(document.getElementById("searchInput").value);
}

window.askDeleteProject = function(){
  openConfirm(
    "Excluir Projeto",
    "Isso vai remover o projeto e todas as pessoas cadastradas nele. Essa ação não pode ser desfeita.",
    () => {
      projects = projects.filter(p => p.id !== currentProjectId);
      save();
      closeConfirm();
      closeDetail();
      render(document.getElementById("searchInput").value);
    }
  );
}

// ─── Detalhe de Governança ────────────────────────────────────────────────────
window.openDetail = function(id){
  currentProjectId = id;
  const p = projects.find(x => x.id === id);
  if(!p) return;
  document.getElementById("detailTitle").textContent = p.nome;
  document.getElementById("detailSponsor").textContent = p.sponsor || "—";
  document.getElementById("detailMeta").textContent = p.codigo ? `Código: ${p.codigo}` : "—";
  renderSections(p);
  document.getElementById("detailOverlay").classList.add("open");
}

window.closeDetail = function(){
  document.getElementById("detailOverlay").classList.remove("open");
  currentProjectId = null;
}

// Export PPT functions
const C = { bg:"#0c1a2b", teal:"#0f9c8c", tealLight:"#2dd4bf", tealBorder:"#1a5c54",
  text:"#ffffff", textDim:"#cbd7e6", textMuted:"#5c7089", textTitle:"#e6edf5",
  line:"#2a4a5c", pill:"#0f9c8c", pillLabel:"#d1fdf4" };

function eBox(label, names){
  const body = names.length
    ? names.map(n => `<div style="color:${C.text};font-weight:700;font-size:14px;line-height:1.45;">${escapeHtml(n)}</div>`).join("")
    : `<div style="color:${C.pillLabel};font-style:italic;font-size:12px;">A definir</div>`;
  return `<div style="background:${C.teal};border-radius:9px;padding:11px 15px;min-width:230px;">
    <div style="color:${C.pillLabel};font-size:10.5px;font-weight:800;letter-spacing:.7px;margin-bottom:5px;">${escapeHtml(label).toUpperCase()}</div>
    ${body}
  </div>`;
}

function eListBox(title, items){
  const body = items.length
    ? items.map(t => `<div style="color:${C.textDim};font-size:12.5px;margin-bottom:5px;line-height:1.4;">&bull;&nbsp; ${escapeHtml(t)}</div>`).join("")
    : `<div style="color:${C.textMuted};font-size:12px;font-style:italic;">A definir</div>`;
  return `<div style="border:1.5px solid ${C.tealLight};border-radius:9px;padding:14px 18px;">
    <div style="color:${C.tealLight};font-size:14px;font-weight:800;margin-bottom:9px;">${escapeHtml(title)}</div>
    ${body}
  </div>`;
}

function buildExportHTML(p){
  const pessoas = p.pessoas || [];
  const byRole = k => pessoas.filter(ps => ps.papel === k);
  const fmt = ps => ps.setor ? `${ps.setor} \u2013 ${ps.nome}` : ps.nome;

  const roles = [
    { key:"pmo", label:"PMO" },
    { key:"gestor", label:"Gestor do Projeto" },
    { key:"lider", label:"L\u00edder do Projeto" },
    { key:"head", label:"Head" },
  ];

  const rightSections = [
    { title:"Equipe de Backoffice", items: byRole("backoffice").map(fmt) },
    { title:"Equipe do Projeto", items: byRole("equipe").map(fmt) },
    { title:"Terceiros", items: byRole("terceiros").map(fmt) },
  ];

  const committeeRows = roles.map((r, i) => {
    const isFirst = i === 0;
    const isLast = i === roles.length - 1;
    return `<tr>
      <td style="width:28px; position:relative; vertical-align:middle;">
        <div style="position:absolute; left:50%; ${isFirst ? "top:50%;" : "top:0;"} ${isLast ? "bottom:50%;" : "bottom:0;"} width:2px; background:${C.line}; transform:translateX(-50%);"></div>
        <div style="position:absolute; left:50%; top:50%; width:50%; height:2px; background:${C.line};"></div>
      </td>
      <td style="padding:8px 0 8px 4px;">${eBox(r.label, byRole(r.key).map(x => x.nome))}</td>
    </tr>`;
  }).join("");

  const rightRows = rightSections.map((s, i) => {
    const isFirst = i === 0;
    const isLast = i === rightSections.length - 1;
    return `<tr>
      <td style="width:28px; position:relative; vertical-align:middle;">
        <div style="position:absolute; left:50%; ${isFirst ? "top:50%;" : "top:0;"} ${isLast ? "bottom:50%;" : "bottom:0;"} width:2px; background:${C.line}; transform:translateX(-50%);"></div>
        <div style="position:absolute; left:50%; top:50%; width:50%; height:2px; background:${C.line};"></div>
      </td>
      <td style="padding:10px 0 10px 4px; width:100%;">${eListBox(s.title, s.items)}</td>
    </tr>`;
  }).join("");

  const sponsorHTML = `
    <div style="background:${C.pill}; border-radius:11px; width:44px; position:relative; flex-shrink:0; align-self:stretch;">
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg); white-space:nowrap; display:flex; align-items:center; gap:11px;">
        <span style="color:${C.pillLabel}; font-size:10px; font-weight:800; letter-spacing:2px;">SPONSOR</span>
        <span style="color:#fff; font-size:16px; font-weight:800;">${escapeHtml(p.sponsor || "\u2014")}</span>
      </div>
    </div>`;

  const bridgeHTML = `
    <div style="display:flex; align-items:center; width:36px; flex-shrink:0;">
      <div style="width:100%; height:2px; background:${C.line};"></div>
    </div>`;

  return `
    <div style="width:1280px; background:${C.bg}; font-family:Inter,Arial,sans-serif; padding:46px 54px;">
      <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;">
        <div style="font-family:Sora,Arial,sans-serif; font-size:32px; font-weight:800; color:#fff; display:flex; align-items:center; gap:6px;">
          <span style="color:${C.tealLight};">\u203a</span>Governan\u00e7a
        </div>
        <div style="font-size:13px; color:#7a8ba3; font-weight:600;">${escapeHtml(p.nome)}${p.codigo ? " \u00b7 C\u00f3digo: " + escapeHtml(p.codigo) : ""}</div>
      </div>
      <div style="height:2px; width:120px; background:linear-gradient(90deg,${C.tealLight},transparent); margin-bottom:34px;"></div>

      <div style="display:flex; align-items:stretch;">
        ${sponsorHTML}
        <div style="margin-left:20px; display:flex; flex-direction:column; justify-content:center;">
          <div style="font-size:12px; font-weight:800; letter-spacing:.6px; color:${C.textTitle}; margin-bottom:12px; padding-left:32px;">COMIT\u00ca EXECUTIVO</div>
          <table style="border-spacing:0; border-collapse:collapse;">${committeeRows}</table>
        </div>
        ${bridgeHTML}
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
          <table style="border-spacing:0; border-collapse:collapse; width:100%;">${rightRows}</table>
        </div>
      </div>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:36px; padding-top:16px; border-top:1px solid #1c2f45;">
        <div style="font-size:10.5px; color:${C.textMuted};">PMO Corporativo \u00b7 Grupo DB</div>
        <div style="font-size:10.5px; color:${C.textMuted};">Gerado via Dashboard de Governan\u00e7a</div>
      </div>
    </div>`;
}

window.exportToPPT = async function(evt){
  const p = projects.find(x => x.id === currentProjectId);
  if(!p) return;
  const btn = evt.target;
  const originalText = btn.textContent;
  btn.textContent = "Gerando imagem...";
  btn.disabled = true;
  try{
    const container = document.getElementById("pptExportContainer");
    container.innerHTML = buildExportHTML(p);
    await new Promise(r => setTimeout(r, 80));
    const canvas = await html2canvas(container, { scale:2, backgroundColor:"#0c1a2b", useCORS:true });
    const dataUrl = canvas.toDataURL("image/png");
    const slug = p.nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `governanca-${slug || "projeto"}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    container.innerHTML = "";
  }catch(e){
    console.error("Erro ao gerar imagem:", e);
    alert("Não foi possível gerar a imagem. Tenta de novo em alguns segundos.");
  }finally{
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

const LEFT_KEYS = ["pmo","gestor","lider","head"];
const RIGHT_KEYS = ["backoffice","equipe","terceiros"];

function buildBox(key, pessoas){
  const conf = PAPEIS[key];
  const lista = pessoas.filter(ps => ps.papel === key);
  const peopleHtml = lista.length
    ? lista.map(ps => `
      <div class="person" style="border-left-color:var(--c-${conf.dot})">
        <div class="person-actions">
          <span onclick="event.stopPropagation(); openEditPerson('${ps.id}')" title="Editar">✏️</span>
          <span onclick="event.stopPropagation(); askDeletePerson('${ps.id}')" title="Excluir">🗑️</span>
        </div>
        <div class="pname">${escapeHtml(ps.nome)}</div>
        <div class="pmeta">
          ${ps.setor ? `<b>Setor:</b> ${escapeHtml(ps.setor)}<br>` : ""}
          ${ps.gerente ? `<b>Gerente:</b> ${escapeHtml(ps.gerente)}<br>` : ""}
          ${ps.head ? `<b>Head:</b> ${escapeHtml(ps.head)}<br>` : ""}
          ${ps.unidade ? `<b>Unidade:</b> ${escapeHtml(ps.unidade)}` : ""}
        </div>
      </div>`).join("")
    : `<div class="sec-empty">Ninguém cadastrado ainda.</div>`;

  return `
    <div class="gov-box">
      <div class="box-title"><span class="dot ${conf.dot}"></span>${conf.label}</div>
      <div class="person-list">${peopleHtml}</div>
      <button class="add-person-btn" onclick="openNewPerson('${key}')">+ Adicionar pessoa</button>
    </div>`;
}

function renderSections(p){
  const pessoas = p.pessoas || [];
  document.getElementById("govLeftBranch").innerHTML = LEFT_KEYS.map(k => buildBox(k, pessoas)).join("");
  document.getElementById("govRightBranch").innerHTML = RIGHT_KEYS.map(k => buildBox(k, pessoas)).join("");
}

window.openNewPerson = function(papel){
  editingPersonId = null;
  currentSectionPapel = papel;
  document.getElementById("personModalTitle").textContent = "Adicionar Pessoa";
  document.getElementById("psPapel").value = papel;
  document.getElementById("psNome").value = "";
  document.getElementById("psSetor").value = "";
  document.getElementById("psUnidade").value = "";
  document.getElementById("psGerente").value = "";
  document.getElementById("psHead").value = "";
  document.getElementById("personOverlay").classList.add("open");
}

window.openEditPerson = function(personId){
  const p = projects.find(x => x.id === currentProjectId);
  const ps = (p.pessoas||[]).find(x => x.id === personId);
  if(!ps) return;
  editingPersonId = personId;
  document.getElementById("personModalTitle").textContent = "Editar Pessoa";
  document.getElementById("psPapel").value = ps.papel;
  document.getElementById("psNome").value = ps.nome;
  document.getElementById("psSetor").value = ps.setor || "";
  document.getElementById("psUnidade").value = ps.unidade || "";
  document.getElementById("psGerente").value = ps.gerente || "";
  document.getElementById("psHead").value = ps.head || "";
  document.getElementById("personOverlay").classList.add("open");
}

window.closePersonModal = function(){
  document.getElementById("personOverlay").classList.remove("open");
}

window.savePerson = function(){
  const nome = document.getElementById("psNome").value.trim();
  if(!nome){ alert("Informe o nome completo."); return; }
  const papel = document.getElementById("psPapel").value;
  const setor = document.getElementById("psSetor").value.trim();
  const unidade = document.getElementById("psUnidade").value.trim();
  const gerente = document.getElementById("psGerente").value.trim();
  const head = document.getElementById("psHead").value.trim();

  const p = projects.find(x => x.id === currentProjectId);
  if(!p.pessoas) p.pessoas = [];

  if(editingPersonId){
    const ps = p.pessoas.find(x => x.id === editingPersonId);
    Object.assign(ps, { papel, nome, setor, unidade, gerente, head });
  } else {
    p.pessoas.push({ id:"pess_"+Date.now(), papel, nome, setor, unidade, gerente, head });
  }
  save();
  closePersonModal();
  renderSections(p);
  render(document.getElementById("searchInput").value);
}

window.askDeletePerson = function(personId){
  openConfirm(
    "Remover Pessoa",
    "Tem certeza que deseja remover essa pessoa da governança do projeto?",
    () => {
      const p = projects.find(x => x.id === currentProjectId);
      p.pessoas = p.pessoas.filter(x => x.id !== personId);
      save();
      closeConfirm();
      renderSections(p);
      render(document.getElementById("searchInput").value);
    }
  );
}

// ─── Confirmação genérica ─────────────────────────────────────────────────────
function openConfirm(title, text, onConfirm){
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("confirmText").textContent = text;
  const btn = document.getElementById("confirmActionBtn");
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  newBtn.addEventListener("click", onConfirm);
  document.getElementById("confirmOverlay").classList.add("open");
}
window.closeConfirm = function(){
  document.getElementById("confirmOverlay").classList.remove("open");
}

// Fechar modais clicando fora
document.querySelectorAll(".overlay").forEach(ov => {
  ov.addEventListener("click", e => { if(e.target === ov) ov.classList.remove("open"); });
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") document.querySelectorAll(".overlay.open").forEach(ov => ov.classList.remove("open"));
});

// ─── Init — Firebase real-time com PROTEÇÃO ANTI-PERDA DE DADOS ─────────────
showLoading();
const localRaw = localStorage.getItem(LOCAL_KEY);

onSnapshot(DOC_REF(), async (snap) => {
  if(snap.exists()){
    const dadosFirebase = JSON.parse(snap.data().data || "[]");

    if(dadosFirebase.length > 0){
      // Dados reais no Firebase → usa eles, e atualiza backup local
      projects = dadosFirebase;
      localStorage.setItem(LOCAL_KEY, JSON.stringify(projects));
      localStorage.setItem(LOCAL_TS_KEY, new Date().toISOString());
    } else if(localRaw && JSON.parse(localRaw).length > 0){
      // Firebase veio vazio mas localStorage tem dados → restaura e resalva
      console.warn("Firebase vazio — restaurando do backup local!");
      projects = JSON.parse(localRaw);
      await save();
    } else {
      projects = [];
    }
    hideLoading();
    render();
  } else if(localRaw && JSON.parse(localRaw).length > 0){
    // Documento não existe no Firebase mas há backup local → restaura
    projects = JSON.parse(localRaw);
    await save();
    hideLoading();
    render();
  } else {
    // Realmente não há nada em lugar nenhum — começa vazio, sem gravar nada ainda
    projects = [];
    hideLoading();
    render();
  }
}, (err) => {
  hideLoading();
  console.error("Erro no Firebase:", err);
  // Erro de conexão → usa backup local se existir, nunca mostra tela vazia por engano
  if(localRaw){
    projects = JSON.parse(localRaw);
    render();
    console.log("✅ Dados restaurados do backup local após erro de conexão.");
  }
});
</script>
