<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governança de Projetos · Grupo DB</title>
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --card2:#1c2229; --border:#2a3138;
    --text:#e6edf3; --text2:#9ba7b4; --text3:#6e7681;
    --blue:#0066ff; --green:#10b981; --red:#ef4444; --orange:#f59e0b; --purple:#8b5cf6;
    --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--border);
    background:var(--card); flex-wrap:wrap; gap:14px;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand img{height:34px; border-radius:4px;}
  .brand h1{font-size:19px; font-weight:600;}
  .brand span{font-size:12px; color:var(--text3); display:block;}
  .toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  input[type="text"]{
    background:var(--card2); border:1px solid var(--border); color:var(--text);
    padding:9px 14px; border-radius:8px; font-size:13px; min-width:220px;
  }
  input[type="text"]:focus, select:focus{outline:1.5px solid var(--blue);}
  .btn{
    background:var(--blue); color:#fff; border:none; padding:10px 16px;
    border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; transition:opacity .15s;
  }
  .btn:hover{opacity:.85;}
  .btn.secondary{background:var(--card2); border:1px solid var(--border); color:var(--text2);}
  .btn.danger{background:var(--red);}
  .btn.ghost{background:transparent; border:1px solid var(--border); color:var(--text2); padding:7px 12px; font-size:12px;}

  main{padding:24px 28px; max-width:1400px; margin:0 auto;}
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px; margin-top:18px;
  }
  .pcard{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; cursor:pointer; transition:border-color .15s, transform .1s;
  }
  .pcard:hover{border-color:var(--blue); transform:translateY(-2px);}
  .pcard .codigo{font-size:11px; color:var(--text3); font-weight:600; letter-spacing:.3px;}
  .pcard h3{font-size:15px; margin:6px 0 12px; line-height:1.3;}
  .pcard .sponsor-row{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); margin-bottom:8px;}
  .pcard .sponsor-row .tag{
    background:rgba(245,158,11,.15); color:var(--orange); padding:2px 8px;
    border-radius:5px; font-size:10px; font-weight:700; letter-spacing:.3px;
  }
  .pcard .count{font-size:12px; color:var(--text3); display:flex; align-items:center; gap:6px;}
  .empty{
    text-align:center; padding:60px 20px; color:var(--text3);
  }
  .empty h2{color:var(--text2); font-size:16px; margin-bottom:8px; font-weight:600;}

  /* Overlay / Modal */
  .overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
    z-index:100; align-items:flex-start; justify-content:center; overflow-y:auto;
    padding:20px 16px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    width:100%; max-width:480px; padding:20px; margin-top:10px;
  }
  .modal.wide{max-width:96vw; width:96vw; max-height:92vh; overflow-y:auto;}
  .modal h2{font-size:16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between;}
  .modal h2 .close{cursor:pointer; color:var(--text3); font-size:20px; line-height:1;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:600;}
  .field input, .field select{
    width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:7px; font-size:13px;
  }
  .field-row{display:flex; gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

  /* Governance detail — organogram / branch style */
  .gov-diagram{display:flex; align-items:stretch; margin-bottom:4px;}

  .gov-rail{
    writing-mode:vertical-rl; transform:rotate(180deg);
    background:linear-gradient(180deg, rgba(245,158,11,.18), rgba(245,158,11,.04));
    border:1px solid rgba(245,158,11,.35); border-radius:8px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 10px; min-width:46px; margin-right:18px; flex-shrink:0;
  }
  .gov-rail .rail-label{font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--orange);}
  .gov-rail .rail-name{font-size:13px; font-weight:700; color:var(--text);}

  .gov-branch, .gov-branch-right{
    position:relative; display:flex; flex-direction:column; gap:10px; padding-left:18px;
  }
  .gov-branch{justify-content:center; margin-right:22px; flex-shrink:0;}
  .gov-branch-right{flex:1; min-width:0;}
  .gov-branch::before, .gov-branch-right::before{
    content:''; position:absolute; left:0; top:18px; bottom:18px; width:2px; background:var(--border);
  }
  .gov-box{
    position:relative; background:var(--card2); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; min-width:170px;
  }
  .gov-box::before{
    content:''; position:absolute; left:-18px; top:18px; width:18px; height:2px; background:var(--border);
  }
  .gov-box .box-title{
    font-size:11px; font-weight:700; letter-spacing:.3px; display:flex; align-items:center; gap:6px; margin-bottom:6px;
  }
  .gov-branch .gov-box .person-list{max-height:120px; overflow-y:auto; margin-right:-6px; padding-right:6px;}
  .gov-branch-right .gov-box .person-list{max-height:190px; overflow-y:auto; margin-right:-6px; padding-right:6px;}
  .gov-box .person-list::-webkit-scrollbar{width:5px;}
  .gov-box .person-list::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}

  .dot{width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0;}
  .dot.blue{background:var(--blue);} .dot.green{background:var(--green);}
  .dot.purple{background:var(--purple);} .dot.orange{background:var(--orange);}
  .dot.grey{background:var(--text3);} .dot.red{background:var(--red);} .dot.teal{background:#14b8a6;}

  .person{
    background:var(--card); border:1px solid var(--border); border-radius:7px;
    padding:9px 40px 9px 11px; margin-bottom:7px; font-size:12px; position:relative;
  }
  .person .pname{font-weight:600; font-size:12.5px; margin-bottom:3px;}
  .person .pmeta{color:var(--text3); font-size:11px; line-height:1.45;}
  .person .pmeta b{color:var(--text2); font-weight:600;}
  .person-actions{position:absolute; top:8px; right:8px; display:flex; gap:6px;}
  .person-actions span{cursor:pointer; color:var(--text3); font-size:12px;}
  .person-actions span:hover{color:var(--text);}
  .add-person-btn{
    width:100%; background:transparent; border:1px dashed var(--border); color:var(--text3);
    padding:6px; border-radius:6px; font-size:11px; cursor:pointer; margin-top:2px;
  }
  .add-person-btn:hover{border-color:var(--blue); color:var(--blue);}
  .sec-empty{font-size:11px; color:var(--text3); font-style:italic; padding:4px 0;}

  @media(max-width:900px){
    .gov-diagram{flex-direction:column; gap:16px;}
    .gov-rail{writing-mode:horizontal-tb; transform:none; min-width:auto; margin-right:0; margin-bottom:4px; flex-direction:row;}
    .gov-branch, .gov-branch-right{padding-left:0; margin-right:0;}
    .gov-branch::before, .gov-branch-right::before, .gov-box::before{display:none;}
  }

  #loadingOverlay{
    position:fixed; inset:0; background:var(--bg); z-index:999;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
  }
  .spinner{
    width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--blue);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .confirm-box p{font-size:13px; color:var(--text2); margin-bottom:18px;}

  @media(max-width:640px){
    header{padding:14px 16px;} main{padding:16px;}
    .toolbar{width:100%;} input[type="text"]{flex:1; min-width:0;}
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="color:#9ba7b4; font-size:13px">Carregando governança dos projetos…</div>
</div>

<header>
  <div class="brand">
    <img id="logoImg" src="" alt="Grupo DB">
    <div>
      <h1>Governança de Projetos</h1>
      <span>PMO Corporativo · Grupo DB</span>
    </div>
  </div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Buscar projeto...">
    <button class="btn secondary" id="backupBtn">⬇ Backup</button>
    <button class="btn" id="newProjectBtn">+ Novo Projeto</button>
  </div>
</header>

<main>
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none">
    <h2>Nenhum projeto cadastrado ainda</h2>
    <p>Clique em "+ Novo Projeto" para começar a mapear a governança.</p>
  </div>
</main>

<!-- Modal: Novo/Editar Projeto -->
<div class="overlay" id="projectOverlay">
  <div class="modal">
    <h2><span id="projectModalTitle">Novo Projeto</span><span class="close" onclick="closeProjectModal()">&times;</span></h2>
    <div class="field">
      <label>Nome do Projeto</label>
      <input type="text" id="pjNome" placeholder="Ex: Projeto Ampliação da UP GO">
    </div>
    <div class="field">
      <label>Código do Projeto</label>
      <input type="text" id="pjCodigo" placeholder="Ex: 6142325">
    </div>
    <div class="field">
      <label>Sponsor</label>
      <input type="text" id="pjSponsor" placeholder="Nome completo do Sponsor">
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeProjectModal()">Cancelar</button>
      <button class="btn" onclick="saveProject()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalhe de Governança -->
<div class="overlay" id="detailOverlay">
  <div class="modal wide">
    <h2>
      <span style="display:flex; align-items:baseline; gap:10px; min-width:0">
        <span id="detailTitle" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Governança</span>
        <span id="detailMeta" style="font-size:11px; color:var(--text3); font-weight:400; white-space:nowrap">—</span>
      </span>
      <span class="close" onclick="closeDetail()">&times;</span>
    </h2>
    <div class="gov-diagram">
      <div class="gov-rail">
        <div class="rail-label">SPONSOR</div>
        <div class="rail-name" id="detailSponsor">—</div>
      </div>
      <div class="gov-branch" id="govLeftBranch"></div>
      <div class="gov-branch-right" id="govRightBranch"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="askDeleteProject()">Excluir Projeto</button>
      <button class="btn secondary" onclick="openEditProject()">Editar Dados do Projeto</button>
    </div>
  </div>
</div>

<!-- Modal: Nova/Editar Pessoa -->
<div class="overlay" id="personOverlay">
  <div class="modal">
    <h2><span id="personModalTitle">Adicionar Pessoa</span><span class="close" onclick="closePersonModal()">&times;</span></h2>
    <div class="field">
      <label>Papel no Projeto</label>
      <select id="psPapel">
        <option value="pmo">PMO</option>
        <option value="gestor">Gestor do Projeto</option>
        <option value="lider">Líder do Projeto</option>
        <option value="head">Head</option>
        <option value="backoffice">Equipe de Backoffice</option>
        <option value="equipe">Equipe do Projeto</option>
        <option value="terceiros">Terceiros</option>
      </select>
    </div>
    <div class="field">
      <label>Nome Completo</label>
      <input type="text" id="psNome" placeholder="Nome completo">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Setor</label>
        <input type="text" id="psSetor" placeholder="Ex: TI, Comercial...">
      </div>
      <div class="field">
        <label>Unidade</label>
        <input type="text" id="psUnidade" placeholder="Ex: Maringá">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Gerente</label>
        <input type="text" id="psGerente" placeholder="Nome do gerente direto">
      </div>
      <div class="field">
        <label>Head</label>
        <input type="text" id="psHead" placeholder="Nome do head">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closePersonModal()">Cancelar</button>
      <button class="btn" onclick="savePerson()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Confirmação -->
<div class="overlay" id="confirmOverlay">
  <div class="modal confirm-box" style="max-width:360px">
    <h2><span id="confirmTitle">Confirmar</span><span class="close" onclick="closeConfirm()">&times;</span></h2>
    <p id="confirmText">Tem certeza?</p>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn danger" id="confirmActionBtn">Confirmar</button>
    </div>
  </div>
</div>

  pmo:         { label:"PMO",                    dot:"blue"   },
  gestor:      { label:"Gestor do Projeto",      dot:"orange" },
  lider:       { label:"Líder do Projeto",       dot:"green"  },
  head:        { label:"Head",                   dot:"teal"   },
  backoffice:  { label:"Equipe de Backoffice",   dot:"purple" },
  equipe:      { label:"Equipe do Projeto",      dot:"blue"   },
  terceiros:   { label:"Terceiros",              dot:"grey"   },
};

let projects = [];
let currentProjectId = null;
let editingProjectId = null;
let editingPersonId = null;
let currentSectionPapel = null;

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}

// ─── SEGURANÇA: salvar com múltiplas camadas de proteção ────────────────────
async function save(){
  // 1) Backup local sempre, antes de qualquer coisa
  try{
    if(projects && projects.length > 0){
      localStorage.setItem(LOCAL_KEY, JSON.stringify(projects));
      localStorage.setItem(LOCAL_TS_KEY, new Date().toISOString());
    }
  }catch(e){ console.warn("Erro no backup local:", e); }

  // 2) NUNCA grava vazio no Firestore por engano
  if(!projects || projects.length === 0){
    console.warn("save() chamado com projects vazio — gravação no Firestore BLOQUEADA por segurança.");
    return;
  }

  // 3) Grava no Firestore
  try{
    await setDoc(DOC_REF(), { data: JSON.stringify(projects) });
  }catch(e){
    console.error("Erro ao salvar no Firestore:", e);
  }
}

function downloadBackup(){
  const blob = new Blob([JSON.stringify(projects, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  a.href = url; a.download = `governanca-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
document.getElementById("backupBtn").addEventListener("click", downloadBackup);

// ─── Render: grid de projetos ────────────────────────────────────────────────
function render(filter=""){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  const f = filter.trim().toLowerCase();
  const list = projects.filter(p =>
    !f || p.nome.toLowerCase().includes(f) || (p.codigo||"").toLowerCase().includes(f)
  );

  if(projects.length === 0){
    grid.innerHTML = ""; empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  if(list.length === 0){
    grid.innerHTML = `<div class="sec-empty" style="grid-column:1/-1; text-align:center; padding:30px">Nenhum projeto encontrado para essa busca.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const total = (p.pessoas||[]).length;
    return `
      <div class="pcard" onclick="openDetail('${p.id}')">
        <div class="codigo">${escapeHtml(p.codigo || "SEM CÓDIGO")}</div>
        <h3>${escapeHtml(p.nome)}</h3>
        <div class="sponsor-row"><span class="tag">SPONSOR</span> ${escapeHtml(p.sponsor || "—")}</div>
        <div class="count">👥 ${total} pessoa${total===1?"":"s"} cadastrada${total===1?"":"s"}</div>
      </div>`;
  }).join("");
}
document.getElementById("searchInput").addEventListener("input", e => render(e.target.value));

// ─── Projeto: criar / editar / excluir ───────────────────────────────────────
window.openNewProject = function(){
  editingProjectId = null;
  document.getElementById("projectModalTitle").textContent = "Novo Projeto";
  document.getElementById("pjNome").value = "";
  document.getElementById("pjCodigo").value = "";
  document.getElementById("pjSponsor").value = "";
  document.getElementById("projectOverlay").classList.add("open");
}
document.getElementById("newProjectBtn").addEventListener("click", window.openNewProject);

window.openEditProject = function(){
  const p = projects.find(x => x.id === currentProjectId);
  if(!p) return;
  editingProjectId = p.id;
  document.getElementById("projectModalTitle").textContent = "Editar Projeto";
  document.getElementById("pjNome").value = p.nome;
  document.getElementById("pjCodigo").value = p.codigo || "";
  document.getElementById("pjSponsor").value = p.sponsor || "";
  document.getElementById("projectOverlay").classList.add("open");
}

window.closeProjectModal = function(){
  document.getElementById("projectOverlay").classList.remove("open");
}

window.saveProject = function(){
  const nome = document.getElementById("pjNome").value.trim();
  if(!nome){ alert("Informe o nome do projeto."); return; }
  const codigo = document.getElementById("pjCodigo").value.trim();
  const sponsor = document.getElementById("pjSponsor").value.trim();

  if(editingProjectId){
    const p = projects.find(x => x.id === editingProjectId);
    p.nome = nome; p.codigo = codigo; p.sponsor = sponsor;
    if(currentProjectId === editingProjectId){
      document.getElementById("detailTitle").textContent = nome;
      document.getElementById("detailSponsor").textContent = sponsor || "—";
      document.getElementById("detailMeta").textContent = codigo ? `Código: ${codigo}` : "—";
    }
  } else {
    projects.push({
      id: "proj_" + Date.now(),
      nome, codigo, sponsor,
      pessoas: []
    });
  }
  save();
  closeProjectModal();
  render(document.getElementById("searchInput").value);
}

window.askDeleteProject = function(){
  openConfirm(
    "Excluir Projeto",
    "Isso vai remover o projeto e todas as pessoas cadastradas nele. Essa ação não pode ser desfeita.",
    () => {
      projects = projects.filter(p => p.id !== currentProjectId);
      save();
      closeConfirm();
      closeDetail();
      render(document.getElementById("searchInput").value);
    }
  );
}

// ─── Detalhe de Governança ────────────────────────────────────────────────────
window.openDetail = function(id){
  currentProjectId = id;
  const p = projects.find(x => x.id === id);
  if(!p) return;
  document.getElementById("detailTitle").textContent = p.nome;
  document.getElementById("detailSponsor").textContent = p.sponsor || "—";
  document.getElementById("detailMeta").textContent = p.codigo ? `Código: ${p.codigo}` : "—";
  renderSections(p);
  document.getElementById("detailOverlay").classList.add("open");
}

window.closeDetail = function(){
  document.getElementById("detailOverlay").classList.remove("open");
  currentProjectId = null;
}

const LEFT_KEYS = ["pmo","gestor","lider","head"];
const RIGHT_KEYS = ["backoffice","equipe","terceiros"];

function buildBox(key, pessoas){
  const conf = PAPEIS[key];
  const lista = pessoas.filter(ps => ps.papel === key);
  const peopleHtml = lista.length
    ? lista.map(ps => `
      <div class="person">
        <div class="person-actions">
          <span onclick="event.stopPropagation(); openEditPerson('${ps.id}')" title="Editar">✏️</span>
          <span onclick="event.stopPropagation(); askDeletePerson('${ps.id}')" title="Excluir">🗑️</span>
        </div>
        <div class="pname">${escapeHtml(ps.nome)}</div>
        <div class="pmeta">
          ${ps.setor ? `<b>Setor:</b> ${escapeHtml(ps.setor)}<br>` : ""}
          ${ps.gerente ? `<b>Gerente:</b> ${escapeHtml(ps.gerente)}<br>` : ""}
          ${ps.head ? `<b>Head:</b> ${escapeHtml(ps.head)}<br>` : ""}
          ${ps.unidade ? `<b>Unidade:</b> ${escapeHtml(ps.unidade)}` : ""}
        </div>
      </div>`).join("")
    : `<div class="sec-empty">Ninguém cadastrado ainda.</div>`;

  return `
    <div class="gov-box">
      <div class="box-title"><span class="dot ${conf.dot}"></span>${conf.label}</div>
      <div class="person-list">${peopleHtml}</div>
      <button class="add-person-btn" onclick="openNewPerson('${key}')">+ Adicionar pessoa</button>
    </div>`;
}

function renderSections(p){
  const pessoas = p.pessoas || [];
  document.getElementById("govLeftBranch").innerHTML = LEFT_KEYS.map(k => buildBox(k, pessoas)).join("");
  document.getElementById("govRightBranch").innerHTML = RIGHT_KEYS.map(k => buildBox(k, pessoas)).join("");
}

// ─── Pessoa: criar / editar / excluir ────────────────────────────────────────
window.openNewPerson = function(papel){
  editingPersonId = null;
  currentSectionPapel = papel;
  document.getElementById("personModalTitle").textContent = "Adicionar Pessoa";
  document.getElementById("psPapel").value = papel;
  document.getElementById("psNome").value = "";
  document.getElementById("psSetor").value = "";
  document.getElementById("psUnidade").value = "";
  document.getElementById("psGerente").value = "";
  document.getElementById("psHead").value = "";
  document.getElementById("personOverlay").classList.add("open");
}

window.openEditPerson = function(personId){
  const p = projects.find(x => x.id === currentProjectId);
  const ps = (p.pessoas||[]).find(x => x.id === personId);
  if(!ps) return;
  editingPersonId = personId;
  document.getElementById("personModalTitle").textContent = "Editar Pessoa";
  document.getElementById("psPapel").value = ps.papel;
  document.getElementById("psNome").value = ps.nome;
  document.getElementById("psSetor").value = ps.setor || "";
  document.getElementById("psUnidade").value = ps.unidade || "";
  document.getElementById("psGerente").value = ps.gerente || "";
  document.getElementById("psHead").value = ps.head || "";
  document.getElementById("personOverlay").classList.add("open");
}

window.closePersonModal = function(){
  document.getElementById("personOverlay").classList.remove("open");
}

window.savePerson = function(){
  const nome = document.getElementById("psNome").value.trim();
  if(!nome){ alert("Informe o nome completo."); return; }
  const papel = document.getElementById("psPapel").value;
  const setor = document.getElementById("psSetor").value.trim();
  const unidade = document.getElementById("psUnidade").value.trim();
  const gerente = document.getElementById("psGerente").value.trim();
  const head = document.getElementById("psHead").value.trim();

  const p = projects.find(x => x.id === currentProjectId);
  if(!p.pessoas) p.pessoas = [];

  if(editingPersonId){
    const ps = p.pessoas.find(x => x.id === editingPersonId);
    Object.assign(ps, { papel, nome, setor, unidade, gerente, head });
  } else {
    p.pessoas.push({ id:"pess_"+Date.now(), papel, nome, setor, unidade, gerente, head });
  }
  save();
  closePersonModal();
  renderSections(p);
  render(document.getElementById("searchInput").value);
}

window.askDeletePerson = function(personId){
  openConfirm(
    "Remover Pessoa",
    "Tem certeza que deseja remover essa pessoa da governança do projeto?",
    () => {
      const p = projects.find(x => x.id === currentProjectId);
      p.pessoas = p.pessoas.filter(x => x.id !== personId);
      save();
      closeConfirm();
      renderSections(p);
      render(document.getElementById("searchInput").value);
    }
  );
}

// ─── Confirmação genérica ─────────────────────────────────────────────────────
function openConfirm(title, text, onConfirm){
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("confirmText").textContent = text;
  const btn = document.getElementById("confirmActionBtn");
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  newBtn.addEventListener("click", onConfirm);
  document.getElementById("confirmOverlay").classList.add("open");
}
window.closeConfirm = function(){
  document.getElementById("confirmOverlay").classList.remove("open");
}

// Fechar modais clicando fora
document.querySelectorAll(".overlay").forEach(ov => {
  ov.addEventListener("click", e => { if(e.target === ov) ov.classList.remove("open"); });
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") document.querySelectorAll(".overlay.open").forEach(ov => ov.classList.remove("open"));
});

// ─── Init — Firebase real-time com PROTEÇÃO ANTI-PERDA DE DADOS ─────────────
showLoading();
const localRaw = localStorage.getItem(LOCAL_KEY);

onSnapshot(DOC_REF(), async (snap) => {
  if(snap.exists()){
    const dadosFirebase = JSON.parse(snap.data().data || "[]");

    if(dadosFirebase.length > 0){
      // Dados reais no Firebase → usa eles, e atualiza backup local
      projects = dadosFirebase;
      localStorage.setItem(LOCAL_KEY, JSON.stringify(projects));
      localStorage.setItem(LOCAL_TS_KEY, new Date().toISOString());
    } else if(localRaw && JSON.parse(localRaw).length > 0){
      // Firebase veio vazio mas localStorage tem dados → restaura e resalva
      console.warn("Firebase vazio — restaurando do backup local!");
      projects = JSON.parse(localRaw);
      await save();
    } else {
      projects = [];
    }
    hideLoading();
    render();
  } else if(localRaw && JSON.parse(localRaw).length > 0){
    // Documento não existe no Firebase mas há backup local → restaura
    projects = JSON.parse(localRaw);
    await save();
    hideLoading();
    render();
  } else {
    // Realmente não há nada em lugar nenhum — começa vazio, sem gravar nada ainda
    projects = [];
    hideLoading();
    render();
  }
}, (err) => {
  hideLoading();
  console.error("Erro no Firebase:", err);
  // Erro de conexão → usa backup local se existir, nunca mostra tela vazia por engano
  if(localRaw){
    projects = JSON.parse(localRaw);
    render();
    console.log("✅ Dados restaurados do backup local após erro de conexão.");
  }
});
</script>
